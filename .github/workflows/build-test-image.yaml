name: Build and Test Container Image

on:
  workflow_call:
    inputs: {}
    secrets:
      # Optional: when provided, the test build logs in to GAR so repo2docker's
      # --cache-from can pull the published image as a layer cache. Diagnostic
      # for the export-OOM investigation; safe to omit (login step is skipped).
      GAR_SECRET_KEY:
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      DOCKER_CONFIG: $HOME/.docker
      # Mapped here so step `if:` conditions can read it (secrets aren't
      # available directly in `if:`).
      GAR_SECRET_KEY: ${{ secrets.GAR_SECRET_KEY }}
    steps:
      - name: Checkout files in repo
        uses: actions/checkout@v6.0.2

      - name: Cleanup disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /opt/hostedtoolcache /usr/local/share/boost /usr/share/swift
          df -h

      # Diagnostic: the export-OOM happens in BuildKit's "exporting layers"
      # (`--load`) phase, whose cost depends on the buildx driver. Print the
      # driver and start a lightweight memory sampler so we can correlate the
      # peak with the export phase. Sampler detaches and is read back later.
      - name: Diagnose builder and start memory monitor
        run: |
          docker buildx ls || true
          docker buildx inspect --bootstrap 2>/dev/null \
            | grep -iE 'name|driver|endpoint' || true
          # shellcheck disable=SC2016  # $(...) must expand inside the detached loop, not now
          nohup bash -c 'while true; do echo "$(date +%T) $(free -m | awk "/Mem:/{print \$3, \$7}")"; sleep 5; done' > /tmp/mem.log 2>&1 &
          disown || true
          echo "memory monitor started (used avail, MB, every 5s)"

      # Diagnostic: log in to GAR so repo2docker's --cache-from can pull the
      # published image as a layer cache (otherwise it fails with
      # "registry cache importer: pull access denied" and every build is cold).
      - name: Log in to GAR (enables --cache-from layer reuse)
        if: env.GAR_SECRET_KEY != ''
        uses: docker/login-action@v4.1.0
        with:
          registry: us-central1-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GAR_SECRET_KEY }}

      - name: Build and test the image if any image file(s) changed
        id: repo2docker
        uses: jupyterhub/repo2docker-action@master
        with:
          FORCE_REPO2DOCKER_VERSION: jupyter-repo2docker==2026.04.0
          REPO_DIR: /srv/repo
          NO_PUSH: true
          IMAGE_NAME: ${{ vars.IMAGE }}

      # Lets us monitor disks getting full as images get bigger over time
      - name: Show how much disk space is left
        run: df -h

      # Diagnostic: report peak memory and the trace, even if the build OOMed.
      - name: Show memory trace
        if: always()
        run: |
          if [ -f /tmp/mem.log ]; then
            echo "=== peak used (MB) ==="
            awk '{print $2}' /tmp/mem.log | sort -n | tail -1
            echo "=== min available (MB) ==="
            awk '{print $3}' /tmp/mem.log | sort -n | head -1
            echo "=== full trace (time used avail) ==="
            cat /tmp/mem.log
          else
            echo "no memory trace captured"
          fi

      - name: Check for browser tests
        id: browser-tests-check
        run: |
          if [ -d "browser-tests" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Start container for browser tests
        if: steps.browser-tests-check.outputs.present == 'true'
        run: |
          docker run -d --name browser-test-container \
            -p 8888:8888 \
            ${{ steps.repo2docker.outputs.IMAGE_SHA_NAME }} \
            jupyter lab --ip=0.0.0.0 --no-browser --ServerApp.token=''

      - name: Wait for Jupyter to be ready
        if: steps.browser-tests-check.outputs.present == 'true'
        run: |
          echo "Waiting for Jupyter server..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8888/api/status > /dev/null 2>&1; then
              echo "Jupyter is ready after $((i * 5))s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Jupyter did not become ready in time"
              docker logs browser-test-container
              exit 1
            fi
            sleep 5
          done

      - name: Install Playwright and run browser tests
        if: steps.browser-tests-check.outputs.present == 'true'
        run: |
          pip install --quiet -r browser-tests/requirements.txt
          playwright install chromium
          pytest browser-tests/ -v

      - name: Stop browser test container
        if: always() && steps.browser-tests-check.outputs.present == 'true'
        run: docker stop browser-test-container || true
